
<style>
*{box-sizing:border-box;margin:0}
.wrap{padding:12px 8px 16px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:500;padding:2px 9px;border-radius:10px;font-family:var(--font-sans);white-space:nowrap}
.row{display:flex;align-items:center;padding:2px 5px;border-radius:5px;min-height:25px}
.row.c{cursor:pointer}
.row.c:hover{background:var(--surface-1)}
.chv{font-size:11px;color:var(--text-muted);width:14px;flex-shrink:0;line-height:1}
.ico{font-size:13px;margin:0 5px;flex-shrink:0}
.nm{font-family:var(--font-mono);font-size:12px;color:var(--text-primary)}
.nm.d{font-weight:500}
.bdg{font-size:10px;font-weight:500;padding:1px 6px;border-radius:8px;margin-left:7px;flex-shrink:0}
.ann{font-size:10.5px;color:var(--text-muted);margin-left:auto;padding-left:10px;white-space:nowrap;font-family:var(--font-sans)}
</style>
<div class="wrap">
  <div class="chips">
    <span class="chip" style="background:#F1EFE8;color:#444441"><i class="ti ti-bolt" aria-hidden="true"></i>Turborepo</span>
    <span class="chip" style="background:#EEEDFE;color:#3C3489"><i class="ti ti-package" aria-hidden="true"></i>pnpm workspaces</span>
    <span class="chip" style="background:#FAEEDA;color:#854F0B"><i class="ti ti-hexagon" aria-hidden="true"></i>Foundry</span>
    <span class="chip" style="background:#E6F1FB;color:#0C447C"><i class="ti ti-triangle" aria-hidden="true"></i>Next.js</span>
    <span class="chip" style="background:#FCEBEB;color:#A32D2D"><i class="ti ti-leaf" aria-hidden="true"></i>NestJS</span>
    <span class="chip" style="background:#E1F5EE;color:#085041"><i class="ti ti-refresh" aria-hidden="true"></i>wagmi codegen</span>
  </div>
  <div id="tree"></div>
</div>
<script>
const D=[
  {n:'apps/',d:1,fc:'#185FA5',ann:'Deployable apps',o:1,k:[
    {n:'web/',d:1,fc:'#185FA5',bdg:'Next.js',bs:'#E6F1FB',bc:'#185FA5',ann:'Frontend dApp',o:1,k:[
      {n:'app/',d:1,o:0,k:[{n:'layout.tsx'},{n:'page.tsx'},{n:'globals.css'}]},
      {n:'components/',d:1,o:0,k:[{n:'ConnectWallet.tsx'},{n:'TxButton.tsx'}]},
      {n:'lib/',d:1,o:1,k:[
        {n:'wagmi.ts',ann:'Web3 provider config'},
        {n:'viem.ts',ann:'Public client setup'},
        {n:'contracts.ts',ann:'Re-exports @repo/abi'},
      ]},
      {n:'public/',d:1,o:0,k:[{n:'favicon.ico'}]},
      {n:'package.json'},{n:'next.config.ts'},{n:'tsconfig.json'},
    ]},
    {n:'backend/',d:1,fc:'#A32D2D',bdg:'NestJS',bs:'#FCEBEB',bc:'#A32D2D',ann:'Optional API layer',o:0,k:[
      {n:'src/',d:1,o:0,k:[
        {n:'app.module.ts'},{n:'main.ts'},
        {n:'contracts/',d:1,o:0,k:[{n:'contracts.service.ts',ann:'Reads on-chain data'}]},
      ]},
      {n:'package.json'},{n:'tsconfig.json'},
    ]},
  ]},
  {n:'packages/',d:1,fc:'#534AB7',ann:'Internal packages',o:1,k:[
    {n:'contracts/',d:1,fc:'#854F0B',bdg:'Foundry',bs:'#FAEEDA',bc:'#854F0B',ann:'Smart contracts',o:1,k:[
      {n:'src/',d:1,o:1,k:[
        {n:'MyContract.sol',ann:'Main contract'},
        {n:'interfaces/',d:1,o:0,k:[{n:'IMyContract.sol'}]},
        {n:'libraries/',d:1,o:0,k:[{n:'Helpers.sol'}]},
      ]},
      {n:'script/',d:1,o:0,k:[{n:'Deploy.s.sol',ann:'Deployment script'}]},
      {n:'test/',d:1,o:0,k:[{n:'MyContract.t.sol'},{n:'helpers/',d:1,o:0,k:[{n:'BaseTest.sol'}]}]},
      {n:'foundry.toml',ann:'Remappings, profile config'},
    ]},
    {n:'abi/',d:1,fc:'#0F6E56',bdg:'Generated',bs:'#E1F5EE',bc:'#0F6E56',ann:'Contracts → apps bridge',o:1,k:[
      {n:'abis/',d:1,ann:'Raw JSON ABIs (from forge build)',o:0,k:[{n:'MyContract.json'}]},
      {n:'types/',d:1,ann:'wagmi CLI typegen output',o:0,k:[{n:'index.ts'},{n:'MyContract.ts'}]},
      {n:'wagmi.config.ts',ann:'Points to Foundry out/'},
      {n:'package.json',ann:'"@repo/abi"'},
      {n:'tsconfig.json'},
    ]},
    {n:'ui/',d:1,fc:'var(--text-secondary)',ann:'Shared React components',o:0,k:[
      {n:'src/',d:1,o:0,k:[{n:'Button.tsx'},{n:'Modal.tsx'},{n:'index.ts'}]},
      {n:'package.json',ann:'"@repo/ui"'},{n:'tsconfig.json'},
    ]},
    {n:'config/',d:1,fc:'var(--text-secondary)',ann:'Shared tooling configs',o:0,k:[
      {n:'eslint/',d:1,o:0,k:[{n:'base.js'},{n:'nextjs.js'}]},
      {n:'tsconfig/',d:1,o:0,k:[{n:'base.json'},{n:'nextjs.json'},{n:'node.json'}]},
      {n:'package.json',ann:'"@repo/config"'},
    ]},
  ]},
  {n:'package.json',ann:'Root workspace (private: true)'},
  {n:'pnpm-workspace.yaml',ann:'packages: ["apps/*","packages/*"]'},
  {n:'turbo.json',ann:'Build pipeline & task deps'},
  {n:'.env.example'},
  {n:'.gitignore'},
];

function ico(n){
  if(!n)return'ti-file';
  if(n.endsWith('.sol'))return'ti-hexagon';
  if(n.endsWith('.ts')||n.endsWith('.tsx'))return'ti-brand-typescript';
  if(n.endsWith('.json'))return'ti-code';
  if(n.endsWith('.toml')||n.endsWith('.yaml')||n.endsWith('.js'))return'ti-settings';
  if(n.startsWith('.'))return'ti-file';
  return'ti-file';
}

let uid=0;
function render(nodes,depth){
  return nodes.map(node=>{
    const id='n'+(++uid);
    const pl=depth*18+4;
    if(!node.d){
      return`<div class="row" style="padding-left:${pl}px">
        <span class="chv"></span>
        <i class="ti ${ico(node.n)} ico" style="color:var(--text-muted)" aria-hidden="true"></i>
        <span class="nm">${node.n}</span>
        ${node.ann?`<span class="ann">${node.ann}</span>`:''}
      </div>`;
    }
    const fc=node.fc||'var(--text-secondary)';
    const isOpen=node.o!==0;
    const hasK=node.k&&node.k.length;
    return`<div>
      <div class="row c" style="padding-left:${pl}px" onclick="tog('${id}','${id}v')">
        <i id="${id}v" class="ti ${isOpen?'ti-chevron-down':'ti-chevron-right'} chv" aria-hidden="true"></i>
        <i class="ti ti-folder ico" style="color:${fc}" aria-hidden="true"></i>
        <span class="nm d" style="color:${fc}">${node.n}</span>
        ${node.bdg?`<span class="bdg" style="background:${node.bs};color:${node.bc}">${node.bdg}</span>`:''}
        ${node.ann?`<span class="ann">${node.ann}</span>`:''}
      </div>
      ${hasK?`<div id="${id}" style="display:${isOpen?'block':'none'}">${render(node.k,depth+1)}</div>`:''}
    </div>`;
  }).join('');
}

function tog(id,vid){
  const el=document.getElementById(id);
  const v=document.getElementById(vid);
  const open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  if(v)v.className=open?'ti ti-chevron-right chv':'ti ti-chevron-down chv';
}

document.getElementById('tree').innerHTML=render(D,0);
</script>
